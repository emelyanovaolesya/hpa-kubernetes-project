apiVersion: v1
kind: Secret
metadata:
  name: alertmanager-monitoring-alertmanager
  namespace: monitoring
type: Opaque
stringData:
  alertmanager.yaml: |
    global:
      resolve_timeout: 5m
    
    route:
      group_by: ['namespace', 'severity', 'alertname']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 12h
      receiver: 'telegram'
    
    receivers:
    - name: 'telegram'
      telegram_configs:
      - bot_token: 'YOUR_BOT_TOKEN'  # Замените на ваш токен от @BotFather
        chat_id: YOUR_CHAT_ID         # Замените на ваш ID (без кавычек)
        api_url: 'https://api.telegram.org'
        send_resolved: true
        parse_mode: 'HTML'
        message: |
          <b>{{ .Status | toUpper }}</b>
          {{ range .Alerts }}
          <b>Alert:</b> {{ .Annotations.summary }}
          <b>Description:</b> {{ .Annotations.description }}
          <b>Severity:</b> {{ .Labels.severity }}
          {{ end }}
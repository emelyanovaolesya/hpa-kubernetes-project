apiVersion: apps/v1
kind: Deployment
metadata:
  name: service-gateway
  labels:
    app: service-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: service-gateway
  template:
    metadata:
      labels:
        app: service-gateway
    spec:
      containers:
      - name: gateway
        image: service-gateway:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
        env:
        - name: JWT_SECRET_KEY
          value: "my-super-secret-key-12345"
        - name: JWT_ALGORITHM
          value: "HS256"
        - name: SERVICE_GATEWAY_HOST
          value: "0.0.0.0"
        - name: SERVICE_GATEWAY_PORT
          value: "8000"
        - name: SERVICE_USERS_URL
          value: "http://service-users:8002"
        - name: SERVICE_ORDERS_URL
          value: "http://service-orders:8001"
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 100m
            memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: service-gateway
spec:
  selector:
    app: service-gateway
  ports:
  - port: 8000
    targetPort: 8000
  type: NodePort
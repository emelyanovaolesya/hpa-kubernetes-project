services:
  postgres:
    image: postgres:15-alpine
    container_name: framework_postgres
    ports:
      - "5432:5432"          # ← добавь эту строку
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-FrameworkPrak2Bd}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  service_users:
    build:
      context: ./service_users
      dockerfile: Dockerfile
    container_name: service_users
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-FrameworkPrak2Bd}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: ${JWT_ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      SERVICE_USERS_HOST: 0.0.0.0
      SERVICE_USERS_PORT: 8002
    networks:
      - backend
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  service_orders:
    build:
      context: ./service_orders
      dockerfile: Dockerfile
    container_name: service_orders
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-FrameworkPrak2Bd}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: ${JWT_ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      SERVICE_ORDERS_HOST: 0.0.0.0
      SERVICE_ORDERS_PORT: 8001
    networks:
      - backend
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  service_gateway:
    build:
      context: ./service_gateway
      dockerfile: Dockerfile
    container_name: service_gateway
    environment:
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      SERVICE_GATEWAY_HOST: 0.0.0.0
      SERVICE_GATEWAY_PORT: 8000
      SERVICE_USERS_URL: http://service_users:8002
      SERVICE_ORDERS_URL: http://service_orders:8001
    ports:
      - "9000:8000"
    networks:
      - backend
    depends_on:
      - service_users
      - service_orders
    restart: unless-stopped

networks:
  backend:
    driver: bridge

volumes:
  postgres_data:
    driver: local
